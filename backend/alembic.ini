# Alembic configuration for GridScore.
# The database URL is injected at runtime from application settings
# (GRIDSCORE_DATABASE_URL) by env.py — it is intentionally absent here so no
# connection string is ever committed.
[alembic]
script_location = app/db/migrations
prepend_sys_path = .
path_separator = os
# UTC, file-system-friendly revision filenames.
timezone = UTC
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
