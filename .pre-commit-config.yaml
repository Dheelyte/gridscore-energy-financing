# Pre-commit hooks for GridScore AI.
#   pip install pre-commit  (or: uv tool install pre-commit)
#   pre-commit install
#   pre-commit run --all-files
default_language_version:
  python: python3.12

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: detect-private-key

  # ---- Backend (Python) ----
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        files: ^backend/

  # ---- Frontend (Node) ----
  # Uses the repo's local toolchain so versions match package.json exactly.
  - repo: local
    hooks:
      - id: prettier
        name: prettier (frontend)
        entry: bash -c 'cd frontend && npx prettier --check "src/**/*.{ts,tsx,css}"'
        language: system
        files: ^frontend/src/.*\.(ts|tsx|css)$
        pass_filenames: false
      - id: eslint
        name: eslint (frontend)
        entry: bash -c 'cd frontend && npx eslint .'
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false
