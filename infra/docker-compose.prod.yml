# =============================================================================
# GridScore AI — backend stack (everything EXCEPT the frontend).
#
# The frontend is deployed separately on Vercel and points at this API via its
# VITE_API_BASE_URL. This compose brings up Postgres, Redis, the API and worker,
# and runs migrations + synthetic seeding automatically — so one command yields
# a fully demo-ready backend:
#
#   cp .env.example .env.prod        # fill in the secrets below
#   docker compose -f infra/docker-compose.prod.yml --env-file .env.prod up -d --build
#
# The API is published on ${API_PORT:-8000}. Point the Vercel app's
# VITE_API_BASE_URL at this host's public URL and set GRIDSCORE_CORS_ORIGINS to
# the Vercel origin. Secrets are supplied via --env-file / the host environment;
# none are baked into this file.
#
# NOTE: `up` (re)seeds SYNTHETIC demo data (incl. the demo login accounts). It is
# safe and repeatable; do not point this at a database with real data.
# =============================================================================
name: gridscore-prod

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # One-shot: apply DB migrations, then exit. Everything else waits for success.
  migrate:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: ["alembic", "upgrade", "head"]
    environment:
      GRIDSCORE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      GRIDSCORE_SECRET_KEY: ${GRIDSCORE_SECRET_KEY:?set GRIDSCORE_SECRET_KEY}
      GRIDSCORE_IDENTITY_HASH_SALT: ${GRIDSCORE_IDENTITY_HASH_SALT:?set salt}
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  # One-shot: load the synthetic demo scenario + demo login accounts, then exit.
  # Runs after migrations; the API waits for it so first requests see data.
  seed:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: ["python", "-m", "app.cli.seed", "--customers", "${SEED_CUSTOMERS:-1000}"]
    environment:
      GRIDSCORE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      GRIDSCORE_SECRET_KEY: ${GRIDSCORE_SECRET_KEY:?set GRIDSCORE_SECRET_KEY}
      GRIDSCORE_IDENTITY_HASH_SALT: ${GRIDSCORE_IDENTITY_HASH_SALT:?set salt}
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      GRIDSCORE_ENV: production
      GRIDSCORE_LOG_JSON: "true"
      GRIDSCORE_SECRET_KEY: ${GRIDSCORE_SECRET_KEY:?set GRIDSCORE_SECRET_KEY}
      GRIDSCORE_IDENTITY_HASH_SALT: ${GRIDSCORE_IDENTITY_HASH_SALT:?set salt}
      GRIDSCORE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      GRIDSCORE_REDIS_URL: redis://redis:6379/0
      # Allow the deployed frontend origin(s) to call this API (comma-separated).
      GRIDSCORE_CORS_ORIGINS: ${GRIDSCORE_CORS_ORIGINS:-https://gridscore-energy-financing.vercel.app}
    # Published so the Vercel SPA (and judges) can reach the API directly.
    ports:
      - "${API_PORT:-8000}:8000"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: ["arq", "app.workers.main.WorkerSettings"]
    environment:
      GRIDSCORE_ENV: production
      GRIDSCORE_LOG_JSON: "true"
      GRIDSCORE_SECRET_KEY: ${GRIDSCORE_SECRET_KEY:?set GRIDSCORE_SECRET_KEY}
      GRIDSCORE_IDENTITY_HASH_SALT: ${GRIDSCORE_IDENTITY_HASH_SALT:?set salt}
      GRIDSCORE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      GRIDSCORE_REDIS_URL: redis://redis:6379/0
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
  redisdata:
